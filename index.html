<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        zinc: {
                            950: '#09090b',
                            900: '#18181b',
                            850: '#1f1f23',
                            800: '#27272a',
                            750: '#2e2e33',
                            700: '#3f3f46',
                            600: '#52525b',
                            500: '#71717a',
                            400: '#a1a1aa',
                            300: '#d4d4d8',
                            200: '#e4e4e7',
                            100: '#f4f4f5',
                            50: '#fafafa',
                        },
                        accent: {
                            DEFAULT: '#6366f1',
                            glow: 'rgba(99, 102, 241, 0.15)',
                            soft: 'rgba(99, 102, 241, 0.08)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #09090b;
            color: #fafafa;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .glass {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
        }
        .glass-card {
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(16px) saturate(1.1);
            -webkit-backdrop-filter: blur(16px) saturate(1.1);
            border: 1px solid rgba(63, 63, 70, 0.4);
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .animate-float { animation: float 8s ease-in-out infinite; }
        .animate-float-delay { animation: float 10s ease-in-out infinite 2s; }
        .animate-float-slow { animation: float 12s ease-in-out infinite 4s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

            Database: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            FlaskConical: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 2v7.31"/><path d="M14 2v7.31"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg>,
            TrendingUp: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            Zap: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Mail: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
            Phone: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            Linkedin: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>,
            Github: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>,

            ChevronRight: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>,
            X: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,

        };

        // ===== ANIMATION VARIANTS =====
        const fadeUp = {
            hidden: { opacity: 0, y: 30 },
            visible: { opacity: 1, y: 0, transition: { duration: 0.6, ease: [0.22, 1, 0.36, 1] } }
        };
        const fadeIn = {
            hidden: { opacity: 0 },
            visible: { opacity: 1, transition: { duration: 0.8 } }
        };
        const staggerContainer = {
            hidden: {},
            visible: { transition: { staggerChildren: 0.1, delayChildren: 0.1 } }
        };

        // ===== REVEAL ON SCROLL COMPONENT =====
        function Reveal({ children, className = "", delay = 0 }) {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: "-50px" });
            return (
                <motion.div
                    ref={ref}
                    initial="hidden"
                    animate={isInView ? "visible" : "hidden"}
                    variants={fadeUp}
                    transition={{ delay }}
                    className={className}
                >
                    {children}
                </motion.div>
            );
        }

        // ===== NAVBAR =====
        function Navbar() {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            const navLinks = [
                { label: "About", href: "#about" },
                { label: "Skills", href: "#skills" },
                { label: "Experience", href: "#experience" },
                { label: "Projects", href: "#projects" },
                { label: "Contact", href: "#contact" },
            ];

            return (
                <motion.nav
                    initial={{ y: -100 }}
                    animate={{ y: 0 }}
                    transition={{ duration: 0.6, ease: [0.22, 1, 0.36, 1] }}
                    className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${
                        scrolled 
                            ? "glass border-b border-zinc-800/50" 
                            : "bg-transparent"
                    }`}
                >
                    <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                        <a href="#" className="flex items-center gap-2.5 group">
                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-sm font-bold shadow-lg shadow-indigo-500/20 group-hover:shadow-indigo-500/40 transition-shadow duration-300">
                                NK
                            </div>
                            <span className="text-zinc-100 font-semibold text-sm tracking-tight hidden sm:block">Nikhil Kandesar</span>
                        </a>

                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link) => (
                                <a
                                    key={link.label}
                                    href={link.href}
                                    className="text-zinc-400 text-sm font-medium hover:text-zinc-100 transition-colors duration-300 relative group"
                                >
                                    {link.label}
                                    <span className="absolute -bottom-1 left-0 w-0 h-[1.5px] bg-gradient-to-r from-indigo-500 to-violet-500 group-hover:w-full transition-all duration-300" />
                                </a>
                            ))}
                        </div>

                        <div className="flex items-center gap-3">
                            <a
                                href="mailto:nikhilkandesar209@gmail.com?subject=Let's Connect"
                                className="hidden sm:flex items-center gap-2 px-4 py-2 text-sm font-medium text-zinc-900 bg-zinc-100 rounded-lg hover:bg-white hover:scale-[1.02] transition-all duration-300"
                            >
                                Get In Touch
                            </a>
                            <button
                                onClick={() => setMobileOpen(!mobileOpen)}
                                className="md:hidden text-zinc-400 hover:text-zinc-100 transition-colors p-1"
                            >
                                {mobileOpen ? <Icons.X /> : <Icons.Menu />}
                            </button>
                        </div>
                    </div>

                    <AnimatePresence>
                        {mobileOpen && (
                            <motion.div
                                initial={{ opacity: 0, height: 0 }}
                                animate={{ opacity: 1, height: "auto" }}
                                exit={{ opacity: 0, height: 0 }}
                                className="md:hidden glass border-t border-zinc-800/50 overflow-hidden"
                            >
                                <div className="px-6 py-4 flex flex-col gap-3">
                                    {navLinks.map((link) => (
                                        <a
                                            key={link.label}
                                            href={link.href}
                                            onClick={() => setMobileOpen(false)}
                                            className="text-zinc-400 text-sm font-medium hover:text-zinc-100 transition-colors py-2"
                                        >
                                            {link.label}
                                        </a>
                                    ))}
                                    <a
                                        href="mailto:nikhilkandesar209@gmail.com?subject=Let's Connect"
                                        className="mt-2 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium text-zinc-900 bg-zinc-100 rounded-lg"
                                    >
                                        Get In Touch
                                    </a>
                                </div>
                            </motion.div>

            );

        // ===== HERO SECTION =====
        function Hero() {
            return (

                        <div className="glow-orb w-[400px] h-[400px] bg-violet-600/10 top-[30%] right-[-5%] animate-float-delay" />

                            transition={{ duration: 0.6, delay: 0.2 }}

                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" />
                            <span className="text-emerald-400 text-xs font-mono font-medium">Available for Opportunities</span>
                        </motion.div>

                        <motion.h1
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.7, delay: 0.25, ease: [0.22, 1, 0.36, 1] }}

                        >
                            <span className="text-zinc-50">Nikhil</span>
                            <br />
                            <span className="bg-gradient-to-r from-indigo-400 via-violet-400 to-fuchsia-400 bg-clip-text text-transparent">
                                Kandesar

                        <motion.p
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}

                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.6, delay: 0.5 }}
                            className="text-zinc-400 max-w-xl mx-auto mb-8 text-base sm:text-lg"

                        </motion.p>

                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.6, delay: 0.6 }}
                            className="flex items-center justify-center gap-4"
                        >
                            <a href="#projects" className="px-6 py-3 rounded-xl font-medium bg-gradient-to-r from-indigo-500 to-violet-600 text-white hover:opacity-90 shadow-lg shadow-indigo-500/20 hover:scale-[1.02] transition-all">
                                View Projects
                            </a>
                            <a href="#contact" className="px-6 py-3 rounded-xl font-medium glass border border-zinc-800 hover:bg-zinc-900/50 hover:scale-[1.02] transition-all text-zinc-200">
                                Let's Talk
                            </a>
                        </motion.div>
                    </div>
                </section>
            );
        }

                    </Reveal>
                    {children}
                </section>
            );
        }

        function About() {
            return (
                <SectionWrapper id="about" title="About Me">
                    <div className="grid md:grid-cols-3 gap-8 text-zinc-400">
                        <div className="md:col-span-2 space-y-4">
                            <p>I build systems that operate without centralized trust. My background centers entirely around Smart Contract security, high-performance DeFi mechanics, and cross-chain architecture interoperability layers.</p>
                            <p>Whether optimizing raw gas overhead or developing complex programmatic staking and governance logic, my aim is flawless protocol reliability under real economic stress parameters.</p>
                        </div>
                        <div className="glass-card p-6 rounded-2xl flex flex-col justify-center">
                            <div className="text-indigo-400 font-bold text-4xl mb-1">3+</div>
                            <div className="text-zinc-300 font-medium text-sm mb-4">Years Web3 Experience</div>
                            <div className="text-indigo-400 font-bold text-4xl mb-1">15+</div>
                            <div className="text-zinc-300 font-medium text-sm">Blockchains Integrated</div>
                        </div>
                    </div>
                </SectionWrapper>
            );
        }

        function Skills() {
            const skillCategories = [
                { title: "Languages", skills: ["Solidity", "Rust", "TypeScript", "Go", "Python"] },
                { title: "Frameworks & Tools", skills: ["Foundry", "Hardhat", "Ethers.js", "Viem", "Anchor (Solana)"] },
                { title: "Infrastructure", skills: ["Graph Protocol", "Chainlink", "IPFS", "Docker", "AWS"] }
            ];
            return (
                <SectionWrapper id="skills" title="Core Capabilities">
                    <div className="grid sm:grid-cols-3 gap-6">
                        {skillCategories.map((cat, i) => (
                            <div key={i} className="glass-card p-6 rounded-2xl">
                                <h3 className="text-zinc-200 font-semibold mb-4 text-base">{cat.title}</h3>
                                <div className="flex flex-wrap gap-2">
                                    {cat.skills.map((skill, si) => (
                                        <span key={si} className="px-3 py-1 rounded-lg text-xs font-mono bg-zinc-900 border border-zinc-800/80 text-zinc-400">
                                            {skill}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </SectionWrapper>
            );
        }

        function Experience() {
            return (
                <SectionWrapper id="experience" title="Professional History">
                    <div className="space-y-8 relative before:absolute before:left-3 before:top-2 before:bottom-2 before:w-[1px] before:bg-zinc-800">
                        <div className="relative pl-8">
                            <div className="absolute left-[7px] top-[7px] w-3 h-3 rounded-full bg-indigo-500 ring-4 ring-indigo-950" />
                            <span className="text-xs font-mono text-indigo-400">2023 - PRESENT</span>
                            <h3 className="text-zinc-100 font-semibold mt-1 text-lg">Senior Smart Contract Engineer</h3>
                            <p className="text-zinc-500 text-sm">DeFi Protocol Infrastructure</p>
                            <p className="text-zinc-400 mt-2 text-sm max-w-2xl">Designed core multi-signature storage vaults and automated liquidity routers yielding optimal routing distributions across multiple active layers.</p>
                        </div>
                    </div>
                </SectionWrapper>
            );
        }

        function Projects() {
            return (
                <SectionWrapper id="projects" title="Selected Artifacts">
                    <div className="grid sm:grid-cols-2 gap-6">
                        <div className="glass-card p-6 rounded-2xl group hover:border-zinc-700 transition-colors">
                            <div className="flex justify-between items-start mb-4">
                                <div className="p-2 rounded-xl bg-indigo-500/10 text-indigo-400"><Icons.Shield /></div>
                                <Icons.ExternalLink />
                            </div>
                            <h3 className="text-zinc-100 font-semibold group-hover:text-indigo-400 transition-colors mb-2">Automated AMM Pool Aggregator</h3>
                            <p className="text-zinc-400 text-sm mb-4">A complete asset router built with Foundry. Optimizes multi-hop conversions over low-tier swap liquidity systems without frontrunning exposure vectors.</p>
                        </div>
                        <div className="glass-card p-6 rounded-2xl group hover:border-zinc-700 transition-colors">
                            <div className="flex justify-between items-start mb-4">
                                <div className="p-2 rounded-xl bg-violet-500/10 text-violet-400"><Icons.Cube /></div>
